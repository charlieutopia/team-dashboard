name: Poll Batch + Persist Results

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 06:00 next day Asia/Kuala_Lumpur
  workflow_dispatch:

concurrency:
  group: poll-batch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build poller + dependencies
        run: |
          pnpm --filter @team-dashboard/shared build
          pnpm --filter @team-dashboard/detector-stuck build
          pnpm --filter @team-dashboard/poller build

      - name: Run poller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
        run: node packages/poller/dist/cli.js
