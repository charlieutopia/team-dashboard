name: Submit Daily Batch

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = 00:00 next day Asia/Kuala_Lumpur
  workflow_dispatch:        # manual trigger for testing

concurrency:
  group: submit-batch       # prevent overlapping cron runs
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build scanner + dependencies
        run: |
          pnpm --filter @team-dashboard/shared build
          pnpm --filter @team-dashboard/detector-drift build
          pnpm --filter @team-dashboard/report-generator build
          pnpm --filter @team-dashboard/scanner build

      - name: Run scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
        run: node packages/scanner/dist/cli.js
